<body>
    <div id="container"></div>
    <script src="http://threejs.org/build/three.min.js"></script>

    <script id="vertexShader" type="x-shader/x-vertex">
        void main() {
            gl_Position = vec4( position, 1.0 );
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        uniform vec2 u_resolution;
        uniform vec2 u_mouse;
        uniform float u_time;

        const int MAX_MARCHING_STEPS = 255;
        const float MIN_DIST = 0.0;
        const float MAX_DIST = 100.0;
        const float EPSILON = 0.0001;

        float sphereSDF(vec3 samplePoint) {
            return length(samplePoint) - 0.5;
        }

        float sceneSDF(vec3 p) {
            float displacement = sin(2.5 * p.x * u_time) * sin(2.5 * p.y * u_time) * sin(5.0 * p.z * u_mouse.y * 0.001) * 0.25;
            float sphere = sphereSDF(p);
            return sphere + displacement;
        }

        /**
        * Using the gradient of the SDF, estimate the normal on the surface at point p.
        */
        vec3 estimateNormal(vec3 p) {
            return normalize(vec3(
                sceneSDF(vec3(p.x + EPSILON, p.y, p.z)) - sceneSDF(vec3(p.x - EPSILON, p.y, p.z)),
                sceneSDF(vec3(p.x, p.y + EPSILON, p.z)) - sceneSDF(vec3(p.x, p.y - EPSILON, p.z)),
                sceneSDF(vec3(p.x, p.y, p.z  + EPSILON)) - sceneSDF(vec3(p.x, p.y, p.z - EPSILON))
            ));
        }

        /**
        * Lighting contribution of a single point light source via Phong illumination.
        * 
        * The vec3 returned is the RGB color of the light's contribution.
        *
        * k_a: Ambient color
        * k_d: Diffuse color
        * k_s: Specular color
        * alpha: Shininess coefficient
        * p: position of point being lit
        * eye: the position of the camera
        * lightPos: the position of the light
        * lightIntensity: color/intensity of the light
        *
        * See https://en.wikipedia.org/wiki/Phong_reflection_model#Description
        */
        vec3 phongContribForLight(vec3 k_d, vec3 k_s, float alpha, vec3 p, vec3 eye,
                                vec3 lightPos, vec3 lightIntensity) {
            vec3 N = estimateNormal(p);
            vec3 L = normalize(lightPos - p);
            vec3 V = normalize(eye - p);
            vec3 R = normalize(reflect(-L, N));
            
            float dotLN = dot(L, N);
            float dotRV = dot(R, V);
            
            if (dotLN < 0.0) {
                // Light not visible from this point on the surface
                return vec3(0.0, 0.0, 0.0);
            } 
            
            if (dotRV < 0.0) {
                // Light reflection in opposite direction as viewer, apply only diffuse
                // component
                return lightIntensity * (k_d * dotLN);
            }
            return lightIntensity * (k_d * dotLN + k_s * pow(dotRV, alpha));
        }

        vec3 phongIllumination(vec3 k_a, vec3 k_d, vec3 k_s, float alpha, vec3 p, vec3 eye) {
            const vec3 ambientLight = 0.5 * vec3(1.0, 1.0, 1.0);
            vec3 color = ambientLight * k_a;
            
            vec3 light1Pos = vec3(4.0,
                                2.0,
                                4.0 * cos(u_time));
            vec3 light1Intensity = vec3(0.9, 0.9, 0.9);
            
            color += phongContribForLight(k_d, k_s, alpha, p, eye,
                                        light1Pos,
                                        light1Intensity);
            
            return color;
        }

        float shortestDistanceToSurface(vec3 eye, vec3 marchingDirection, float start, float end) {
            float depth = start;
            for (int i = 0; i < MAX_MARCHING_STEPS; i++) {
                float dist = sceneSDF(eye + depth * marchingDirection);
                if (dist < EPSILON) {
                    return depth;
                }
                depth += dist;
                if (depth >= end) {
                    return end;
                }
            }
            return end;
        }

        vec3 rayDirection(float fieldOfView, vec2 size, vec2 fragCoord) {
            vec2 xy = fragCoord - size / 2.0;
            float z = size.y / tan(radians(fieldOfView) / 2.0);
            return normalize(vec3(xy, -z));
        }

        void main()
        {
            vec3 dir = rayDirection(45.0, u_resolution.xy, gl_FragCoord.xy);
            vec3 eye = vec3(0.0, 0.0, 5.0);
            float dist = shortestDistanceToSurface(eye, dir, MIN_DIST, MAX_DIST);
            
            if (dist > MAX_DIST - EPSILON) {
                // Didn't hit anything
                gl_FragColor = vec4(0.0, 0.0, 0.0, 0.0);
                return;
            }
            
            // The closest point on the surface to the eyepoint along the view ray
            vec3 p = eye + dist * dir;
            
            vec3 K_a = vec3(0.2, 0.2, 0.2);
            vec3 K_d = vec3(1.0, 1.0, 1.0);
            vec3 K_s = vec3(0.75, 0.75, 0.75);
            float shininess = 10.0;
            
            vec3 color = phongIllumination(K_a, K_d, K_s, shininess, p, eye);
            
            gl_FragColor = vec4(color, 1.0);
        }

    </script>

    <script>
        var container;
        var camera, scene, renderer;
        var clock;
        var uniforms;
        var mouse = { x: 0, y: 0 };

        document.onmousemove = getMouseXY;

        init();
        animate();

        function getMouseXY(e) {
            mouse.x = e.pageX;
            mouse.y = e.pageY;
        }

        function init() {
            container = document.getElementById('container');

            camera = new THREE.Camera();
            camera.position.z = 1;

            scene = new THREE.Scene();

            var geometry = new THREE.PlaneBufferGeometry(window.innerWidth, window.innerHeight);
            clock = new THREE.Clock();
            clock.start();
            uniforms = {
                u_time: { type: "f", value: clock.elapsedTime },
                u_mouse: { type: "v2", value: new THREE.Vector2() },
                u_resolution: { type: "v2", value: new THREE.Vector2() }
            };
            var material = new THREE.ShaderMaterial({
                uniforms: uniforms,
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent
            });

            var mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            renderer = new THREE.WebGLRenderer();
            renderer.setPixelRatio(window.devicePixelRatio);

            container.appendChild(renderer.domElement);

            onWindowResize();
            window.addEventListener('resize', onWindowResize, false);
        }

        function onWindowResize(event) {
            renderer.setSize(window.innerWidth, window.innerHeight);
            uniforms.u_resolution.value.x = renderer.domElement.width;
            uniforms.u_resolution.value.y = renderer.domElement.height;
        }

        function animate() {
            requestAnimationFrame(animate);
            render();
        }

        function render() {
            uniforms.u_time.value = clock.getElapsedTime();
            uniforms.u_mouse.value.x = mouse.x;
            uniforms.u_mouse.value.y = mouse.y;
            renderer.render(scene, camera);
        }
    </script>
</body>
