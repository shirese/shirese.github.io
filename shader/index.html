<!DOCTYPE html>

<head>
    <style>
        #overlay {
            position: absolute;
            z-index: 1;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
            background-color: #000000;
            color: #ffffff;
        }
    </style>
</head>

<body>
    <div id="overlay">
        <div>
            <button id="startButton">Click to Play</button>
            <p>Automatic audio playback requires a user interaction.</p>
        </div>
    </div>
    <script src="../js/three.js"></script>

    <script>
        function ShaderLoader(vertex_url, fragment_url, onLoad, onProgress, onError) {
            var vertex_loader = new THREE.FileLoader(THREE.DefaultLoadingManager);
            vertex_loader.setResponseType('text');
            vertex_loader.load(vertex_url, function (vertex_text) {
                var fragment_loader = new THREE.FileLoader(THREE.DefaultLoadingManager);
                fragment_loader.setResponseType('text');
                fragment_loader.load(fragment_url, function (fragment_text) {
                    onLoad(vertex_text, fragment_text);
                });
            }, onProgress, onError);
        }

        var camera, scene, renderer, mouseDown, clock, analyser, uniforms;

        var startButton = document.getElementById('startButton');
        startButton.addEventListener('click', init);
        var mouse = {
            x: 0,
            y: 0
        };
        document.onmousemove = getMouseXY;

        function getMouseXY(e) {
            mouse.x = e.pageX;
            mouse.y = e.pageY;
        }

        function init() {
            var overlay = document.getElementById('overlay');
            overlay.remove();
            document.body.addEventListener("mousedown", function (event) {
                mouseDown = true
            }, false);
            document.body.addEventListener("mouseup", function (event) {
                mouseDown = false
            }, false);
            clock = new THREE.Clock();
            clock.start();
            uniforms = {
                u_time: {
                    type: "f",
                    value: clock.elapsedTime
                },
                u_mouse: {
                    type: "v2",
                    value: new THREE.Vector2()
                },
                u_resolution: {
                    type: "v2",
                    value: new THREE.Vector2()
                },
                u_au_freq: {
                    type: "f",
                    value: 0.0
                }
            };
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 10);
            camera.position.z = 2;

            var listener = new THREE.AudioListener();
            camera.add(listener);

            var sound = new THREE.Audio(listener);

            var mediaElement = new Audio('sounds/dnb.ogg');
            mediaElement.loop = true;
            mediaElement.play();

            sound.setMediaElementSource(mediaElement);

            analyser = new THREE.AudioAnalyser(sound, 32);

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);


            var positions = [
                -1, -1, 0,
                1, -1, 0,
                -1, 1, 0,
                -1, 1, 0,
                1, -1, 0,
                1, 1, 0
            ];
            // var positions = [-1280, 304, 0, 1280, 304, 0, -1280, -304, 0, 1280, -304, 0];

            var geometry = new THREE.BufferGeometry();
            var positionAttribute = new THREE.Float32BufferAttribute(positions, 3);

            geometry.addAttribute('position', positionAttribute);

            ShaderLoader("./vertex.vert", "./fragment.frag",
                function (vertex, fragment) {
                    var material = new THREE.RawShaderMaterial({
                        vertexShader: vertex,
                        fragmentShader: fragment,
                        uniforms: uniforms
                    });

                    var mesh = new THREE.Mesh(geometry, material);
                    scene.add(mesh);
                }
            );


            var canvas = document.createElement('canvas');
            var context = canvas.getContext('webgl2');

            renderer = new THREE.WebGLRenderer({
                canvas: canvas,
                context: context
            });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            uniforms.u_resolution.value.x = renderer.domElement.width;
            uniforms.u_resolution.value.y = renderer.domElement.height;
            window.addEventListener('resize', onWindowResize, false);
            animate();
        }

        function onWindowResize() {

            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            uniforms.u_resolution.value.x = renderer.domElement.width;
            uniforms.u_resolution.value.y = renderer.domElement.height;
            renderer.setSize(window.innerWidth, window.innerHeight);

        }

        function animate() {
            requestAnimationFrame(animate);
            render()
        }

        function render() {
            uniforms.u_au_freq.value = analyser.getAverageFrequency();
            uniforms.u_time.value = clock.getElapsedTime();
            if (mouseDown == true) {
                uniforms.u_mouse.value.x = mouse.x;
                uniforms.u_mouse.value.y = mouse.y;
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
