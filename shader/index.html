<body>
    <div id="container"></div>
    <script src="../js/three.js"></script>
    <script src="../js/OrbitControl.js"></script>
    <script id="vertexShader" type="x-shader/x-vertex">
        void main() {
            gl_Position = vec4( position, 1.0 );
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        uniform vec2 u_resolution;
        uniform vec2 u_mouse;
        uniform float u_time;

        const int MAX_MARCHING_STEPS = 255;
        const float MIN_DIST = 0.0;
        const float MAX_DIST = 100.0;
        const float EPSILON = 0.0001;

        float opUnion( float d1, float d2 ) {  return(min(d1,d2)); }

        float sdRoundCone( in vec3 p, in float r1, float r2, float h )
        {
            vec2 q = vec2( length(p.xz), p.y );
            
            float b = (r1-r2)/h;
            float a = sqrt(1.0-b*b);
            float k = dot(q,vec2(-b,a));
            
            if( k < 0.0 ) return length(q) - r1;
            if( k > a*h ) return length(q-vec2(0.0,h)) - r2;
                
            return dot(q, vec2(a,b) ) - r1;
        }

        float sphereSDF(vec3 samplePoint) {
            return length(samplePoint) - 0.3;
        }

        vec2 map(vec3 p) {
            vec2 ret;
            mat3 rotTest;
            rotTest[0] = vec3(cos(radians(u_time)), -sin(radians(u_time)), 0);
            rotTest[1] = vec3(sin(radians(u_time)), cos(radians(u_time)), 0);
            rotTest[2] = vec3(0, 0, 1);
            float displacement = sin(2.5 * p.x * u_time) * sin(2.5 * p.y * u_time) * sin(5.0 * p.z * u_mouse.y * 0.001) * 0.25;
            vec2 sphere = vec2(sphereSDF(p + vec3(0, 0.1, 0)), 0.25);
            vec2 cone = vec2(sdRoundCone(rotTest * p, 0.25, 0.25, 0.25), 0.5);
            ret.x = opUnion(sphere.x, cone.x) + displacement;
            if (sphere.x < cone.x)
                ret.y = sphere.y;
            else
                ret.y = cone.y;
            return ret;
        }

        vec3 estimateNormal(vec3 p) {
            vec2 v1 = map(vec3(p.x + EPSILON, p.y, p.z)) - map(vec3(p.x - EPSILON, p.y, p.z));
            vec2 v2 = map(vec3(p.x, p.y + EPSILON, p.z)) - map(vec3(p.x, p.y - EPSILON, p.z));
            vec2 v3 = map(vec3(p.x, p.y, p.z  + EPSILON)) - map(vec3(p.x, p.y, p.z - EPSILON));
            return normalize(vec3(
                v1.x,
                v2.x,
                v3.x
            ));
        }

        vec3 phongContribForLight(vec3 k_d, vec3 k_s, float alpha, vec3 p, vec3 ro,
                                vec3 lightPos, vec3 lightIntensity) {
            vec3 N = estimateNormal(p);
            vec3 L = normalize(lightPos - p);
            vec3 V = normalize(ro - p);
            vec3 R = normalize(reflect(-L, N));
            
            float dotLN = dot(L, N);
            float dotRV = dot(R, V);
            
            if (dotLN < 0.0) {
                // Light not visible from this point on the surface
                return vec3(0.0, 0.0, 0.0);
            } 
            
            if (dotRV < 0.0) {
                // Light reflection in opposite direction as viewer, apply only diffuse
                // component
                return lightIntensity * (k_d * dotLN);
            }
            return lightIntensity * (k_d * dotLN + k_s * pow(dotRV, alpha));
        }

        vec3 phongIllumination(vec3 k_a, vec3 k_d, vec3 k_s, float alpha, vec3 p, vec3 ro) {
            const vec3 ambientLight = 0.5 * vec3(1.0, 1.0, 1.0);
            vec3 color = ambientLight * k_a;
            
            vec3 light1Pos = vec3(4.0,
                                2.0,
                                4.0 * cos(u_time));
            vec3 light1Intensity = vec3(0.9, 0.9, 0.9);
            
            color += phongContribForLight(k_d, k_s, alpha, p, ro,
                                        light1Pos,
                                        light1Intensity);
            
            return color;
        }

        float shortestDistanceToSurface(vec3 ro, vec3 marchingDirection, float start, float end) {
            float depth = start;
            for (int i = 0; i < MAX_MARCHING_STEPS; i++) {
                vec2 p = map(ro + depth * marchingDirection);
                float dist = p.x;
                if (dist < EPSILON) {
                    if (p.y <= 0.25)
                        gl_FragColor = vec4(0.0, 0.0, 1.0, 1.0);
                    else if (p.y <= 0.5)
                        gl_FragColor = vec4(1.0, 0.0, 0.0, 1.0);
                    return depth;
                }
                depth += dist;
                if (depth >= end) {
                    return end;
                }
            }
            return end;
        }

        vec3 rayDirection(float fieldOfView, vec2 size, vec2 fragCoord) {
            vec2 xy = fragCoord - size / 2.0;
            float z = size.y / tan(radians(fieldOfView) / 2.0);
            return normalize(vec3(xy, -z));
        }

        void main()
        {
            vec2 mo = u_resolution.xy + u_mouse.xy;
            vec3 dir = rayDirection(45.0, mo, gl_FragCoord.xy);
            vec3 ro = vec3(0.0, 0.0, 5.0);
            float dist = shortestDistanceToSurface(ro, dir, MIN_DIST, MAX_DIST);
            
            if (dist > MAX_DIST - EPSILON) {
                gl_FragColor = vec4(0.0, 0.0, 0.0, 0.0);
                return;
            }
            //vec3 p = ro + dist * dir;
            //vec3 K_a;
            //vec3 K_d;
            //vec3 K_s;
            //float shininess;
            //K_a = vec3(0.2, 0.2, 0.2);
            //K_d = vec3(1.0, 1.0, 1.0);
            //K_s = vec3(0.75, 0.75, 0.75);
            //shininess = 10.0;
            //vec3 color = phongIllumination(K_a, K_d, K_s, shininess, p, ro);
            //gl_FragColor = vec4(color, 1.0);
        }

    </script>

    <script>
        var container;
        var camera, scene, renderer, controls;
        var clock;
        var uniforms;
        var mouse = {
            x: 0,
            y: 0
        };

        document.onmousemove = getMouseXY;

        init();
        animate();

        function getMouseXY(e) {
            mouse.x = e.pageX;
            mouse.y = e.pageY;
        }

        function init() {
            container = document.getElementById('container');

            camera = new THREE.Camera();
            camera.position.y = 20;
            camera.position.z = 100;

            scene = new THREE.Scene();

            var geometry = new THREE.PlaneBufferGeometry(window.innerWidth, window.innerHeight);
            clock = new THREE.Clock();
            clock.start();
            uniforms = {
                u_time: {
                    type: "f",
                    value: clock.elapsedTime
                },
                u_mouse: {
                    type: "v2",
                    value: new THREE.Vector2()
                },
                u_resolution: {
                    type: "v2",
                    value: new THREE.Vector2()
                }
            };
            var material = new THREE.ShaderMaterial({
                uniforms: uniforms,
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent
            });

            var mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            renderer = new THREE.WebGLRenderer();
            renderer.setPixelRatio(window.devicePixelRatio);

            controls = new THREE.OrbitControls( camera, renderer.domElement );

            controls.enableDamping = true; // an animation loop is required when either damping or auto-rotation are enabled
            controls.dampingFactor = 0.25;
            controls.screenSpacePanning = false;
            controls.minDistance = 100;
            controls.maxDistance = 500;
            container.appendChild(renderer.domElement);

            onWindowResize();
            window.addEventListener('resize', onWindowResize, false);
        }

        function onWindowResize(event) {
            renderer.setSize(window.innerWidth, window.innerHeight);
            uniforms.u_resolution.value.x = renderer.domElement.width;
            uniforms.u_resolution.value.y = renderer.domElement.height;
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            render();
        }

        function render() {
            uniforms.u_time.value = clock.getElapsedTime();
            uniforms.u_mouse.value.x = mouse.x;
            uniforms.u_mouse.value.y = mouse.y;
            renderer.render(scene, camera);
        }
    </script>
</body>
